<header class="bg-white border-b border-[#e4e7ec] sticky top-0 z-50">
  <div class="max-w-[1280px] mx-auto px-8 flex items-center gap-10 py-[18px]">
    <!-- Logo -->
    <a href="#" class="flex items-center gap-3">
      <span
        class="relative w-11 h-11 grid place-items-center rounded overflow-hidden bg-[var(--navy)]"
      >
        <span
          class="absolute inset-0"
          style="
            background: linear-gradient(
              135deg,
              transparent 60%,
              var(--accent) 60%,
              var(--accent) 65%,
              transparent 65%
            );
          "
        ></span>
        <svg
          class="relative z-10 w-[22px] h-[22px] text-white"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"
          />
        </svg>
      </span>
      <span class="leading-tight">
        <strong
          class="block text-[17px] font-extrabold tracking-wide text-[var(--navy)]"
          >АГРОПРЕССОЙЛ</strong
        >
        <span class="block text-[11px] uppercase tracking-widest text-[#5c6675]"
          >Производство с 2009 года</span
        >
      </span>
    </a>

    <!-- Nav -->
    <nav class="ml-auto flex gap-1">
      <a
        href="{% url 'home' %}"
        class="px-3.5 py-2.5 text-sm font-semibold rounded transition-colors {% if request.resolver_match.url_name == 'home' %}text-[var(--accent)]{% else %}text-[#1a1f2b] hover:text-[var(--accent)]{% endif %}"
        >Главная</a
      >

      <a
        href="{% url 'catalog' %}"
        class="px-3.5 py-2.5 text-sm font-semibold rounded transition-colors {% if request.resolver_match.url_name == 'catalog' %}text-[var(--accent)]{% else %}text-[#1a1f2b] hover:text-[var(--accent)]{% endif %}"
        >Каталог</a
      >
      <a
        href="{% url 'repair' %}"
        class="px-3.5 py-2.5 text-sm font-semibold rounded transition-colors {% if request.resolver_match.url_name == 'repair' %}text-[var(--accent)]{% else %}text-[#1a1f2b] hover:text-[var(--accent)]{% endif %}"
        >Ремонт</a
      >
      <a
        href="{% url 'news' %}"
        class="px-3.5 py-2.5 text-sm font-semibold rounded transition-colors {% if request.resolver_match.url_name == 'news' %}text-[var(--accent)]{% else %}text-[#1a1f2b] hover:text-[var(--accent)]{% endif %}"
        >Новости</a
      >
      <a
        href="{% url 'about' %}"
        class="px-3.5 py-2.5 text-sm font-semibold rounded transition-colors {% if request.resolver_match.url_name == 'about' %}text-[var(--accent)]{% else %}text-[#1a1f2b] hover:text-[var(--accent)]{% endif %}"
        >О компании</a
      >
      <a
        href="{% url 'contacts' %}"
        class="px-3.5 py-2.5 text-sm font-semibold rounded transition-colors {% if request.resolver_match.url_name == 'contacts' %}text-[var(--accent)]{% else %}text-[#1a1f2b] hover:text-[var(--accent)]{% endif %}"
        >Контакты</a
      >
    </nav>

    <!-- CTA -->
    <a
      href="tel:+79186373301"
      class="inline-flex items-center gap-2 px-[18px] py-[11px] bg-[var(--accent)] hover:bg-[var(--accent-hover)] text-white text-sm font-bold rounded transition-colors"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"
        />
      </svg>
      <span>+7 918 637-33-01</span>
    </a>
  </div>
</header>
