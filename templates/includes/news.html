{% for new in news %}
  <a
    href="#"
    class="group relative block aspect-[4/5] overflow-hidden rounded-lg shadow-sm hover:shadow-xl transition-shadow"
  >
    <img
      src="{{ new.image.url }}"
      alt="{{ new.title }}"
      onerror="this.style.display = 'none'"
      loading="lazy"
      decoding="async"
      class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
    />
    <div
      class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent"
    ></div>
    <div class="absolute inset-x-0 bottom-0 p-6 text-white">
      <h3 class="text-xl font-bold mb-2 leading-tight">
        {{ new.title }}
      </h3>
      <p class="text-sm text-white/80 leading-relaxed line-clamp-2 mb-3">
        {{ new.description|truncatewords:15 }}
      </p>
      <div class="flex items-center justify-between">
          <span class="px-2 py-1 bg-[var(--accent)] text-[11px] font-bold uppercase tracking-wider rounded">
            {{ new.created_at|date:"d M Y"|upper }}
          </span>
          <span class="inline-flex items-center gap-1 text-sm font-semibold text-[#ff8a4d] group-hover:gap-2 transition-all">
            Читать
            <svg class="w-3 h-3"><use href="#icon-arrow-thick" /></svg>
          </span>
      </div>
    </div>
  </a>
{% endfor %}
